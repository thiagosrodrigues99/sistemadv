<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem ADV | Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <div class="logo">DIOGO<span>.</span></div>
            <h2>Acesso Restrito</h2>
            <p>Entre com suas credenciais de administrador.</p>
        </div>

        <form class="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="nome@exemplo.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="login-options">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox"> Lembrar acesso
                </label>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>

        <a href="../index.html" class="back-home">← Voltar para a Landing Page</a>
    </div>

    <script type="module">
        document.querySelector('.login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Simulação de login
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Autenticando...';
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = '../dashboard/index.html';
            }, 1000);
        });
    </script>
</body>
</html>
